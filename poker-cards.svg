<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Two playing cards">
  <!-- Back card (peeking, tilted left) -->
  <g transform="rotate(-15 26 34)">
    <rect x="12" y="16" width="26" height="36" rx="4.5" fill="#ffffff" stroke="#16a34a" stroke-width="1.6"/>
    <!-- Heart pip -->
    <path d="M25 30.2c-1.1-2.2-4.4-2-4.4 0.7 0 1.9 2.4 3.7 4.4 5.1 2-1.4 4.4-3.2 4.4-5.1 0-2.7-3.3-2.9-4.4-0.7z" fill="#e0384e"/>
  </g>
  <!-- Front card (tilted right) -->
  <g transform="rotate(11 38 34)">
    <rect x="26" y="14" width="26" height="38" rx="4.5" fill="#ffffff" stroke="#16a34a" stroke-width="1.8"/>
    <!-- Corner rank A -->
    <text x="30" y="24" font-family="Georgia, 'Times New Roman', serif" font-size="9" font-weight="700" fill="#1f2937">A</text>
    <!-- Spade pip -->
    <path d="M39 27c-2.6 3-6.4 5.6-6.4 9 0 2.1 1.7 3.4 3.5 3.4 0.9 0 1.7-0.3 2.2-0.9-0.2 1.6-0.8 2.8-1.9 3.7h5.2c-1.1-0.9-1.7-2.1-1.9-3.7 0.5 0.6 1.3 0.9 2.2 0.9 1.8 0 3.5-1.3 3.5-3.4 0-3.4-3.8-6-6.4-9z" fill="#16a34a"/>
  </g>
</svg>
