<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Premium Pond System — Phase 2 Comparison</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 28px; color: #17210f; background: #f1eedf; font-family: Arial, sans-serif; }
    header { max-width: 1380px; margin: 0 auto 20px; }
    h1 { margin: 0 0 6px; font-size: 24px; }
    p { margin: 0; color: #5b6452; font-size: 13px; }
    main { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 18px; max-width: 1380px; margin: 0 auto; }
    figure { margin: 0; overflow: hidden; background: #fffdf1; border: 2px solid #17210f; border-radius: 14px; box-shadow: 0 5px 0 rgba(23,33,15,.72); }
    figcaption { display: flex; justify-content: space-between; gap: 10px; padding: 12px 14px; border-bottom: 2px solid #17210f; font-size: 12px; font-weight: 700; }
    figcaption span { color: #0c6d35; font-size: 10px; letter-spacing: .12em; text-transform: uppercase; }
    img { display: block; width: 100%; aspect-ratio: 1440 / 1024; object-fit: cover; object-position: top center; }
  </style>
</head>
<body>
  <header>
    <h1>Premium pond system — phase 2</h1>
    <p>Selected direction beside its two product extensions at the same desktop viewport.</p>
  </header>
  <main>
    <figure>
      <figcaption>Selected visual direction <span>Source</span></figcaption>
      <img src="visual-target-option-3.png" alt="Selected premium pond visual direction">
    </figure>
    <figure>
      <figcaption>Pogo Leap <span>Implementation</span></figcaption>
      <img src="06-game-after-desktop-pass-2.png" alt="Polished Pogo Leap desktop screen">
    </figure>
    <figure>
      <figcaption>Pogo Poker <span>Implementation</span></figcaption>
      <img src="09-poker-after-desktop-pass-1.png" alt="Polished Pogo Poker desktop landing">
    </figure>
  </main>
</body>
</html>
