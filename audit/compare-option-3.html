<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Option 3 Design QA Comparison</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 20px; background: #111827; color: #fff; font: 600 14px system-ui, sans-serif; }
        main { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; }
        figure { margin: 0; min-width: 0; }
        figcaption { margin-bottom: 8px; letter-spacing: .08em; text-transform: uppercase; }
        img { display: block; width: 100%; height: auto; border: 2px solid #fbbf24; background: #fff; }
    </style>
</head>
<body>
    <main>
        <figure>
            <figcaption>Source visual target</figcaption>
            <img src="visual-target-option-3.png" alt="Selected option 3 source design">
        </figure>
        <figure>
            <figcaption>Rendered implementation</figcaption>
            <img src="implementation-option-3-final-desktop.png" alt="Rendered implementation of option 3">
        </figure>
    </main>
</body>
</html>
