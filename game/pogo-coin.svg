  <circle cx="36" cy="42" r="2.6" fill="#fff4cf"/>
  <circle cx="58" cy="42" r="2.6" fill="#fff4cf"/>
  <path d="M37 60 Q50 69 63 60" fill="none" stroke="#7a4a0c" stroke-width="3.4" stroke-linecap="round"/>
  <!-- shine highlight -->
