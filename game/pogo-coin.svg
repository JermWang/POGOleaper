<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="pcFace" cx="38%" cy="33%" r="72%">
      <stop offset="0%" stop-color="#ffe680"/>
      <stop offset="58%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#e0930f"/>
    </radialGradient>
  </defs>
  <!-- coin body + rim -->
  <circle cx="50" cy="50" r="47" fill="#c9820c"/>
  <circle cx="50" cy="50" r="47" fill="none" stroke="#a8690a" stroke-width="2.5"/>
